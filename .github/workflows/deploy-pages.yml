name: Build and deploy Godot Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot 4.7 and export templates
        shell: bash
        run: |
          curl -L -o godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
          curl -L -o templates.tpz \
            https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/4.7.stable"
          unzip -q templates.tpz -d templates
          cp -R templates/templates/. "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Run smoke tests
        run: |
          ./Godot_v4.7-stable_linux.x86_64 --headless --editor --path . --quit
          ./Godot_v4.7-stable_linux.x86_64 --headless --path . \
            --script res://tests/smoke_test.gd
          ./Godot_v4.7-stable_linux.x86_64 --headless --path . \
            --script res://tests/runtime_regression_test.gd

      - name: Export Web build
        run: |
          mkdir -p build/web
          ./Godot_v4.7-stable_linux.x86_64 --headless --path . \
            --export-release Web build/web/index.html
          touch build/web/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
